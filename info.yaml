project:
  title: "Minimal RV32E SoC with UART Loader"
  author: "Kris / KLuterIRV"
  discord: ""
  description: "Minimal RV32E microcontroller with UART program loader, internal instruction memory, GPIO and configurable 7-segment output"
  language: "Verilog"
  clock_hz: 20000000
  tiles: "1x1"
  top_module: "tt_um_kluterirv_rv32e_core"
  source_files:
    - "tt_um_kluterirv_rv32e_core.v"
    - "top/soc_top.v"
    - "cpu/core.v"
    - "cpu/alu.v"
    - "cpu/decoder.v"
    - "cpu/regfile.v"
    - "mem/imem.v"
    - "peripherals/dmem.v"
    - "peripherals/sevenseg.v"
    - "peripherals/uart_tx.v"
    - "peripherals/uart_rx.v"
    - "boot/uart_loader.v"

pinout:
  ui[0]: "boot_mode"
  ui[1]: "uart0_rx"
  ui[2]: "unused"
  ui[3]: "unused"
  ui[4]: "unused"
  ui[5]: "unused"
  ui[6]: "unused"
  ui[7]: "unused"

  uo[0]: "gpio_out[0] / seg_a"
  uo[1]: "gpio_out[1] / seg_b"
  uo[2]: "gpio_out[2] / seg_c"
  uo[3]: "gpio_out[3] / seg_d"
  uo[4]: "gpio_out[4] / seg_e"
  uo[5]: "gpio_out[5] / seg_f"
  uo[6]: "gpio_out[6] / seg_g"
  uo[7]: "gpio_out[7] / dp"

  uio[0]: "uart0_tx"
  uio[1]: "halted_debug"
  uio[2]: "loader_done_debug"
  uio[3]: "loader_error_debug"
  uio[4]: "unused"
  uio[5]: "unused"
  uio[6]: "unused"
  uio[7]: "unused"

yaml_version: 6