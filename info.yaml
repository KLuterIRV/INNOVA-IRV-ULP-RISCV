# Tiny Tapeout project information
project:
  title:        "INNOVA-IRV-ULP-RISCV"      # Project title
  author:       "Kristian Thomas Luter Arregui"      # Your name
  discord:      ""      # Your discord username, for communication and automatically assigning you a Tapeout role (optional)
  description:  "Minimal RV32E microcontroller with UART program loader, internal instruction memory, GPIO and configurable 7-segment output"      # One line description of what your project does
  language:     "Verilog" # other examples include SystemVerilog, Amaranth, VHDL, etc
  clock_hz:     20000000       # Clock frequency in Hz (or 0 if not applicable)

  # How many tiles your design occupies? A single tile is about 340x160 uM.
  tiles: "4x2"          # Valid values: 1x1, 1x2, 2x2, 3x2, 4x2, 3x4 or 4x4

  # Your top module name must start with "tt_um_". Make it unique by including your github username:
  top_module:  "tt_um_innova_irv_ulp_riscv"

  # List your project's source files here.
  # Source files must be in ./src and you must list each source file separately, one per line.
  # Don't forget to also update `PROJECT_SOURCES` in test/Makefile.
  source_files:
    - "tt_um_innova_irv_ulp_riscv.v"
    - "mem/latch_mem_2r1w.v"
    - "mem/gf180_latch_bit.v"

# The pinout of your project. Leave unused pins blank. DO NOT delete or add any pins.
# This section is for the datasheet/website. Use descriptive names (e.g., RX, TX, MOSI, SCL, SEG_A, etc.).
pinout:
  # Inputs
  ui[0]: "payload[0]"
  ui[1]: "payload[1]"
  ui[2]: "payload[2]"
  ui[3]: "payload[3]"
  ui[4]: "payload[4]"
  ui[5]: "payload[5]"
  ui[6]: "cmd[0]"
  ui[7]: "cmd[1]"

  # Outputs
  uo[0]: "read_port_a[0]"
  uo[1]: "read_port_a[1]"
  uo[2]: "read_port_a[2]"
  uo[3]: "read_port_a[3]"
  uo[4]: "read_port_a[4]"
  uo[5]: "read_port_a[5]"
  uo[6]: "read_port_a[6]"
  uo[7]: "read_port_a[7]"

  # Bidirectional pins
  uio[0]: "write_data[0] / read_port_b[0]"
  uio[1]: "write_data[1] / read_port_b[1]"
  uio[2]: "write_data[2] / read_port_b[2]"
  uio[3]: "write_data[3] / read_port_b[3]"
  uio[4]: "write_data[4] / read_port_b[4]"
  uio[5]: "write_data[5] / read_port_b[5]"
  uio[6]: "write_data[6] / read_port_b[6]"
  uio[7]: "write_data[7] / read_port_b[7]"

# Do not change!
yaml_version: 6
